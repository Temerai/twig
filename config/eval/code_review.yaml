- task: code_review
  input: |
    --- a/auth.go
    +++ b/auth.go
    @@ -10,6 +10,8 @@
     func Login(username, password string) (*User, error) {
    -    user := db.FindUser(username)
    -    if user.Password == password {
    +    user, err := db.FindUser(username)
    +    if err != nil {
    +        return nil, err
    +    }
    +    if user.Password == password {
             return user, nil
         }
  rubric:
    - "mentions that plaintext password comparison is a security risk"
    - "notes the improvement in error handling"
    - "suggests using bcrypt or similar for password hashing"

